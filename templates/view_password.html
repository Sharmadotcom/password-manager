<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>View Password | Passify</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        /* ── Copy button row ─────────────────── */
        .copy-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 6px;
        }

        .copy-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 16px;
            border-radius: 12px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.07);
            color: #fff;
            transition: background .2s, transform .15s, box-shadow .2s;
            letter-spacing: .02em;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,.13);
            box-shadow: 0 4px 18px rgba(0,0,0,.25);
            transform: translateY(-1px);
        }

        .copy-btn:active {
            transform: scale(.97);
        }

        .copy-btn svg {
            flex-shrink: 0;
            opacity: .75;
        }

        /* ── Toggle button ───────────────────── */
        .toggle-btn {
            width: 100%;
            margin-top: 4px;
            margin-bottom: 18px;
            background: rgba(255,255,255,.05) !important;
            border: 1px solid rgba(255,255,255,.08);
            color: #9ca3af;
            font-size: .88rem;
        }

        .toggle-btn:hover {
            background: rgba(255,255,255,.10) !important;
            color: #fff;
        }

        /* ── Inline copy feedback toast ──────── */
        .copy-toast {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 11px 16px;
            border-radius: 10px;
            font-size: .88rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity .25s, transform .25s;
            pointer-events: none;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .copy-toast.success {
            background: rgba(34,197,94,.14);
            border: 1px solid rgba(34,197,94,.35);
            color: #86efac;
        }

    </style>

</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="auth-brand">

            <div class="auth-logo">
                🔐
            </div>

            <h1>
                Passify
            </h1>

        </div>

        <span class="hero-tag">
            SECURE VAULT
        </span>

        <h2>

            View.<br>
            Copy.<br>
            Protect.

        </h2>

        <p>

            Access your saved credentials
            securely whenever you need them.

        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>
                Password Details
            </h2>

            <p class="auth-subtitle">
                Stored securely inside your vault.
            </p>

            <!-- Website -->
            <div class="form-group">

                <label>Website</label>

                <input
                    type="text"
                    value="{{ website }}"
                    readonly>

            </div>

            <!-- Username -->
            <div class="form-group">

                <label>Username</label>

                <input
                    id="usernameField"
                    type="text"
                    value="{{ username }}"
                    readonly>

            </div>

            <!-- Password -->
            <div class="form-group">

                <label>Password</label>

                <input
                    id="passwordField"
                    type="password"
                    value="{{ password }}"
                    readonly>

            </div>

            <!-- Toggle visibility -->
            <button
                class="auth-btn toggle-btn"
                id="toggleBtn"
                onclick="togglePassword()">

                <span id="toggleIcon">👁️</span>&nbsp;<span id="toggleLabel">Show Password</span>

            </button>

            <!-- Copy buttons -->
            <div class="copy-row">

                <button
                    class="copy-btn"
                    id="copyUsernameBtn"
                    onclick="copyField('usernameField', 'username', this)">

                    <!-- clipboard icon -->
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>

                    Copy Username

                </button>

                <button
                    class="copy-btn"
                    id="copyPasswordBtn"
                    onclick="copyField('passwordField', 'password', this)">

                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>

                    Copy Password

                </button>

            </div>

            <!-- Inline feedback toast -->
            <div class="copy-toast success" id="copyToast">
                ✅ <span id="copyToastText">Copied to clipboard!</span>
            </div>

            <div class="auth-footer">

                <a href="/dashboard">
                    ← Back to Dashboard
                </a>

            </div>

        </div>

    </div>

</div>

<script>

let toastTimer = null;

function showToast(message) {

    const toast = document.getElementById("copyToast");
    document.getElementById("copyToastText").textContent = message;

    toast.classList.add("show");

    clearTimeout(toastTimer);

    toastTimer = setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);

}

function copyField(fieldId, label, btn) {

    const value = document.getElementById(fieldId).value;

    navigator.clipboard.writeText(value).then(() => {

        // Briefly flash the button green
        const original = btn.innerHTML;
        btn.innerHTML = `✅ Copied!`;
        btn.style.background = "rgba(34,197,94,.18)";
        btn.style.borderColor = "rgba(34,197,94,.4)";
        btn.style.color = "#86efac";

        showToast(`${label.charAt(0).toUpperCase() + label.slice(1)} copied to clipboard!`);

        setTimeout(() => {
            btn.innerHTML = original;
            btn.style.background = "";
            btn.style.borderColor = "";
            btn.style.color = "";
        }, 2000);

    }).catch(() => {
        showToast("⚠️ Could not access clipboard.");
    });

}

let passwordVisible = false;

function togglePassword() {

    const field = document.getElementById("passwordField");
    const icon  = document.getElementById("toggleIcon");
    const label = document.getElementById("toggleLabel");

    passwordVisible = !passwordVisible;

    field.type        = passwordVisible ? "text"            : "password";
    icon.textContent  = passwordVisible ? "🙈"              : "👁️";
    label.textContent = passwordVisible ? "Hide Password"   : "Show Password";

}

</script>

</body>

</html>
