<!DOCTYPE html>
<html>
<head>
    <title>View Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow mt-5">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Password Details
                    </h2>

                    <div class="mb-3">

                        <label class="form-label">
                            Website
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ website }}"
                            readonly>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ username }}"
                            readonly>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ password }}"
                            readonly>

                    </div>

                    <a
                        href="/dashboard"
                        class="btn btn-secondary w-100">

                        Back to Dashboard

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
