<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>View Password | Passify</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="auth-brand">

            <div class="auth-logo">
                🔐
            </div>

            <h1>
                Passify
            </h1>

        </div>

        <span class="hero-tag">
            SECURE VAULT
        </span>

        <h2>

            View.<br>
            Copy.<br>
            Protect.

        </h2>

        <p>

            Access your saved credentials
            securely whenever you need them.

        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>
                Password Details
            </h2>

            <p class="auth-subtitle">
                Stored securely inside your vault.
            </p>

            <div class="form-group">

                <label>
                    Website
                </label>

                <input
                    type="text"
                    value="{{ website }}"
                    readonly>

            </div>

            <div class="form-group">

                <label>
                    Username
                </label>

                <input
                    id="usernameField"
                    type="text"
                    value="{{ username }}"
                    readonly>

            </div>

            <button
                class="auth-btn"
                onclick="copyUsername()">

                Copy Username

            </button>

            <br><br>

            <div class="form-group">

                <label>
                    Password
                </label>

                <input
                    id="passwordField"
                    type="password"
                    value="{{ password }}"
                    readonly>

            </div>

            <button
                class="auth-btn"
                onclick="togglePassword()">

                Show / Hide Password

            </button>

            <br><br>

            <button
                class="auth-btn"
                onclick="copyPassword()">

                Copy Password

            </button>

            <div class="auth-footer">

                <a href="/dashboard">

                    ← Back to Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    let field =
    document.getElementById(
        "passwordField"
    );

    if(field.type === "password"){

        field.type = "text";

    }else{

        field.type = "password";

    }

}

function copyPassword(){

    let password =
    document.getElementById(
        "passwordField"
    ).value;

    navigator.clipboard.writeText(
        password
    );

    alert(
        "Password copied!"
    );

}

function copyUsername(){

    let username =
    document.getElementById(
        "usernameField"
    ).value;

    navigator.clipboard.writeText(
        username
    );

    alert(
        "Username copied!"
    );

}

</script>

</body>

</html>
