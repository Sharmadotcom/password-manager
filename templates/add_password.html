<!DOCTYPE html>
<html>
<body>

<h1>Add Password</h1>

<form method="POST">

    <input
        type="text"
        name="website"
        placeholder="Website"
        required>

    <input
        type="text"
        name="site_username"
        placeholder="Site Username"
        required>

    <input
        type="text"
        name="site_password"
        placeholder="Password"
        required>

    <button type="submit">
        Save
    </button>

</form>

<a href="/dashboard">Back</a>

</body>
</html>
