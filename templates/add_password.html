<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Password | Passify</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="auth-brand">

            <div class="auth-logo">
                🔐
            </div>

            <h1>
                Passify
            </h1>

        </div>

        <span class="hero-tag">
            SECURE VAULT
        </span>

        <h2>

            Add.<br>
            Protect.<br>
            Store.

        </h2>

        <p>

            Save your credentials securely inside
            your encrypted vault.

        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>
                Add Password
            </h2>

            <p class="auth-subtitle">
                Create a new secure password entry.
            </p>

            <form method="POST">

                <div class="form-group">

                    <label>
                        Website
                    </label>

                    <input
                        type="text"
                        name="website"
                        placeholder="github.com"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        name="site_username"
                        placeholder="Website username"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="site_password"
                        placeholder="Enter password"
                        required>

                    <div id="strength-container">

                        <div id="strength-bar"></div>

                    </div>

                    <p id="strength-text">
                        Password Strength
                    </p>
<button
    type="button"
    class="auth-btn secondary-btn"
    onclick="generatePassword()">

    Generate Strong Password

</button>
                </div>

                <button
                    type="submit"
                    class="auth-btn">

                    Save Password

                </button>

            </form>

            <div class="auth-footer">

                <a href="/dashboard">

                    ← Back to Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

<script>

const passwordInput =
document.getElementById("password");

const strengthBar =
document.getElementById("strength-bar");

const strengthText =
document.getElementById("strength-text");

passwordInput.addEventListener(
    "input",
    () => {

        let password =
        passwordInput.value;

        let score = 0;

        if(password.length >= 8)
            score++;

        if(/[A-Z]/.test(password))
            score++;

        if(/[a-z]/.test(password))
            score++;

        if(/[0-9]/.test(password))
            score++;

        if(/[^A-Za-z0-9]/.test(password))
            score++;

        if(score <= 2){

            strengthBar.style.width = "33%";
            strengthBar.style.background = "#ef4444";

            strengthText.innerText =
            "Weak Password";

        }

        else if(score <= 4){

            strengthBar.style.width = "66%";
            strengthBar.style.background = "#f59e0b";

            strengthText.innerText =
            "Medium Password";

        }

        else{

            strengthBar.style.width = "100%";
            strengthBar.style.background = "#22c55e";

            strengthText.innerText =
            "Strong Password";

        }

    }
);
function generatePassword(){

    const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

    let password = "";

    for(let i = 0; i < 16; i++){

        password += chars.charAt(
            Math.floor(
                Math.random() * chars.length
            )
        );

    }

    passwordInput.value = password;

    passwordInput.dispatchEvent(
        new Event("input")
    );

}
</script>

</body>
</html>
