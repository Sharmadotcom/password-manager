<!DOCTYPE html>
<html>
<head>
    <title>Password Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h1>Password Manager</h1>
            <p class="text-muted">
                Welcome {{ session['username'] }}
            </p>
        </div>

        <div>
            <a href="/logout" class="btn btn-danger">
                Logout
            </a>
        </div>

    </div>

    <div class="mb-4">

        <a href="/add-password" class="btn btn-primary">
            Add Password
        </a>

        <a href="/generate-password" class="btn btn-success">
            Generate Password
        </a>

    </div>

    <form method="GET" action="/dashboard" class="mb-4">

        <div class="input-group">

            <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Search website">

            <button
                type="submit"
                class="btn btn-secondary">

                Search

            </button>

        </div>

    </form>

    {% if passwords %}

        {% for item in passwords %}

        <div class="card mb-3 shadow-sm">

            <div class="card-body">

                <h5 class="card-title">
                    {{ item[1] }}
                </h5>

                <p class="card-text">
                    <strong>Username:</strong>
                    {{ item[2] }}
                </p>

                <a
                    href="/view-password/{{ item[0] }}"
                    class="btn btn-info">

                    View

                </a>

                <a
                    href="/edit-password/{{ item[0] }}"
                    class="btn btn-warning">

                    Edit

                </a>

                <a
                    href="/delete-password/{{ item[0] }}"
                    class="btn btn-danger">

                    Delete

                </a>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-info">

            No passwords found.

        </div>

    {% endif %}

</div>

</body>
</html>
