<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Password Generator | Passify</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="auth-brand">

            <div class="auth-logo">
                🔐
            </div>

            <h1>Passify</h1>

        </div>

        <span class="hero-tag">
            PASSWORD GENERATOR
        </span>

        <h2>

            Generate.<br>
            Copy.<br>
            Secure.

        </h2>

        <p>

            Create powerful passwords
            instantly.

        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>Password Generator</h2>

            <p class="auth-subtitle">

                Customize and generate
                secure passwords.

            </p>

            <div class="form-group">

                <label>

                    Length:
                    <span id="lengthValue">
                        16
                    </span>

                </label>

                <input
                    type="range"
                    id="length"
                    min="8"
                    max="32"
                    value="16">

            </div>

            <div class="checkbox-group">

                <label>
                    <input
                        type="checkbox"
                        id="uppercase"
                        checked>

                    Uppercase Letters
                </label>

                <label>
                    <input
                        type="checkbox"
                        id="numbers"
                        checked>

                    Numbers
                </label>

                <label>
                    <input
                        type="checkbox"
                        id="symbols"
                        checked>

                    Symbols
                </label>

            </div>

            <br>

            <div class="form-group">

                <label>
                    Generated Password
                </label>

                <input
                    type="text"
                    id="passwordOutput"
                    readonly>

            </div>

            <button
                class="auth-btn"
                onclick="generatePassword()">

                Generate Password

            </button>

            <br><br>

            <button
                class="auth-btn secondary-btn"
                onclick="copyPassword()">

                Copy Password

            </button>

            <div class="auth-footer">

                <a href="/dashboard">

                    ← Back to Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

<script>

const lengthSlider =
document.getElementById("length");

const lengthValue =
document.getElementById("lengthValue");

lengthSlider.addEventListener(
    "input",
    () => {

        lengthValue.innerText =
        lengthSlider.value;

    }
);

function generatePassword(){

    let chars =
    "abcdefghijklmnopqrstuvwxyz";

    if(
        document.getElementById(
            "uppercase"
        ).checked
    ){

        chars +=
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    }

    if(
        document.getElementById(
            "numbers"
        ).checked
    ){

        chars +=
        "0123456789";

    }

    if(
        document.getElementById(
            "symbols"
        ).checked
    ){

        chars +=
        "!@#$%^&*()_+-=[]{}";

    }

    let password = "";

    for(
        let i = 0;
        i < lengthSlider.value;
        i++
    ){

        password +=
        chars.charAt(

            Math.floor(
                Math.random() *
                chars.length
            )

        );

    }

    document.getElementById(
        "passwordOutput"
    ).value = password;

}

function copyPassword(){

    let password =
    document.getElementById(
        "passwordOutput"
    ).value;

    navigator.clipboard.writeText(
        password
    );

    alert(
        "Password copied!"
    );

}

generatePassword();

</script>

</body>

</html>
