<!DOCTYPE html>
<html>
<head>
    <title>Edit Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow mt-5">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Edit Password
                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Website
                            </label>

                            <input
                                type="text"
                                name="website"
                                class="form-control"
                                value="{{ record[0] }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                name="site_username"
                                class="form-control"
                                value="{{ record[1] }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                New Password
                            </label>

                            <input
                                type="text"
                                name="site_password"
                                class="form-control"
                                placeholder="Enter New Password"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-warning w-100">

                            Save Changes

                        </button>

                    </form>

                    <hr>

                    <a
                        href="/dashboard"
                        class="btn btn-secondary w-100">

                        Back to Dashboard

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
