```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Password | Passify</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="auth-brand">

            <div class="auth-logo">
                🔐
            </div>

            <h1>
                Passify
            </h1>

        </div>

        <span class="hero-tag">
            SECURE VAULT
        </span>

        <h2>

            Update.<br>
            Improve.<br>
            Secure.

        </h2>

        <p>

            Keep your credentials up to date
            and maintain strong security.

        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>
                Edit Password
            </h2>

            <p class="auth-subtitle">
                Update your saved credentials.
            </p>

            <form method="POST">

                <div class="form-group">

                    <label>
                        Website
                    </label>

                    <input
                        type="text"
                        name="website"
                        value="{{ record[0] }}"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        name="site_username"
                        value="{{ record[1] }}"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        New Password
                    </label>

                    <input
                        type="password"
                        name="site_password"
                        placeholder="Enter new password"
                        required>

                </div>

                <button
                    type="submit"
                    class="auth-btn">

                    Save Changes

                </button>

            </form>

            <div class="auth-footer">

                <a href="/dashboard">

                    ← Back to Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
```
