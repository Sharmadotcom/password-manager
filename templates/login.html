<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Passify Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="auth-brand">

            <div class="auth-logo">
    🔐
</div>

            <h1>
                Passify
            </h1>

        </div>

        <span class="hero-tag">
            PASSIFY SECURITY
        </span>

        <h2>

            Secure.<br>
            Private.<br>
            Yours.

        </h2>

        <p>

            Store and manage your passwords
            safely with end-to-end encryption.

        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>
                Welcome Back
            </h2>

            <p class="auth-subtitle">
                Login to access your secure vault.
            </p>

            <form method="POST">

                <div class="form-group">

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Enter username"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Master Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter password"
                        required>

                </div>

                <button
                    type="submit"
                    class="auth-btn">

                    Login

                </button>

            </form>

            <div class="auth-footer">

                Don't have an account?

                <a href="/register">

                    Register

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
