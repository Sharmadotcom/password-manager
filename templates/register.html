<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | Passify</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="auth-brand">

            <div class="auth-logo">
                🔐
            </div>

            <h1>
                Passify
            </h1>

        </div>

        <span class="hero-tag">
            PASSIFY SECURITY
        </span>

        <h2>

            Start.<br>
            Secure.<br>
            Today.

        </h2>

        <p>

            Create your account and protect
            your passwords with modern encryption.

        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>
                Create Account
            </h2>

            <p class="auth-subtitle">
                Build your secure password vault.
            </p>

            <form method="POST">

                <div class="form-group">

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Choose a username"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Master Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Create a strong password"
                        required>

                </div>

                <button
                    type="submit"
                    class="auth-btn">

                    Create Account

                </button>

            </form>

            <div class="auth-footer">

                Already have an account?

                <a href="/">

                    Login

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
