<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verification | Passify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .modal-container { display: block;
            max-width: 420px;
            width: 100%;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 24px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="modal-container">
        <h1 style="margin-top:0;">Two-Factor Auth</h1>
        <p style="color:#9ca3af; margin-bottom:24px;">Enter the 6-digit code from your authenticator app.</p>
        
        <form method="POST" action="/login-2fa">
            <div class="form-group" style="text-align: left;">
                <input type="text" name="token" placeholder="000000" maxlength="6" autocomplete="off" required style="text-align: center; letter-spacing: 12px; font-size: 1.5rem; font-weight: bold; padding: 16px;">
            </div>
            
            <button type="submit" class="auth-btn" style="width: 100%; margin-top: 12px;">Verify Code</button>
            <a href="/logout" style="display:block; margin-top:16px; color:#9ca3af; text-decoration:none;">Cancel Login</a>
        </form>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container">
        {% for category, message in messages %}
        <div class="flash {{ category }}" role="alert">
            {{ message }}
            <button class="flash-dismiss" onclick="this.parentElement.style.animation='flashOut .3s forwards';setTimeout(()=>this.parentElement.remove(),300);">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

</body>
</html>
